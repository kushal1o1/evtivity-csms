server {
    listen 7101;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /v1 {
        proxy_pass http://api:7102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed bundle output (Vite emits content-hashed filenames in /assets/).
    # Safe to cache aggressively because a content change produces a new
    # filename; the index.html will reference the new hash.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html and the SPA fallback. Must NEVER be cached -- if the browser
    # holds a stale index.html it references chunk hashes that no longer
    # exist on disk, causing "Failed to fetch dynamically imported module"
    # after a rebuild.
    location / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
